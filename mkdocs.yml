site_name: Tài liệu FPTOJ (FPT Online Judge)
site_url: https://docs.fptoj.com
repo_name: FPTOJ-OJ/online-judge
repo_url: https://github.com/FPTOJ-OJ/online-judge

theme:
  name: material
  language: vi
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html

nav:
  - Trang chủ: index.md
  - Trang web (Site):
    - Cài đặt hệ thống: site/installation.md
    - Cập nhật hệ thống: site/updating.md
    - Thể lệ kỳ thi (Contest Formats): site/contest_formats.md
    - Định dạng Contest Themis: site/themis_contest.md
    - Cấu hình PDF (html-to-pdf-flask): site/html-to-pdf-flask.md
    - Hệ thống phân quyền: site/permission_system.md
    - Quản lý bài tập qua giao diện: site/managing_problems.md
    - Hiển thị công thức Toán (LaTeX): site/mathoid.md
    - Hiển thị hình vẽ LaTeX: site/texoid.md
    - Chống spam bằng Cloudflare Turnstile: site/turnstile.md
    - Proxy SSL cho nội dung: site/ssl_content_proxy.md
    - Tải dữ liệu người dùng: site/user_data_download.md
    - Tài liệu API: site/api.md
  - Trình chấm (Judge):
    - Cài đặt Judge: judge/setting_up_a_judge.md
    - Cấu hình Judge: judge/judge_configuration.md
    - Ngôn ngữ lập trình: judge/supported_languages.md
    - Các mã trạng thái: judge/status_codes.md
  - Định dạng đề bài:
    - Định dạng bài tập: problem_format/problem_format.md
    - Trình chấm tùy chỉnh (Checker): problem_format/custom_checkers.md
    - Trình chấm tùy chỉnh (Grader): problem_format/custom_graders.md
    - Trình sinh test (Generator): problem_format/generator.md
    - Các bài tập mẫu: problem_format/problem_examples.md
    - Mẫu thiết lập bài tập C++: problem_format/cpp_psetting_templates.md
  - Mẫu cấu hình:
    - Tổng quan: sample_files/index.md
    - local_settings.py: sample_files/local_settings.py
    - nginx.conf: sample_files/nginx.conf
    - judge_conf.yml: sample_files/judge_conf.yml
    - problem_markdown_example.md.txt: sample_files/problem_markdown_example.md.txt
    - uwsgi.ini: sample_files/uwsgi.ini
    - site.conf: sample_files/site.conf
    - bridged.conf: sample_files/bridged.conf
    - html-to-pdf-flask.conf: sample_files/html-to-pdf-flask.conf
    - celery.conf: sample_files/celery.conf
    - wsevent.conf: sample_files/wsevent.conf
    - Mẫu C++: sample_files/problem_setting/validator.cpp
  - Thông tin:
    - Bản quyền: about/LICENSE.md
